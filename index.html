<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F6FA;--card:#fff;--card-sh:0 1px 2px rgba(0,0,0,.03);--sb-bg:#fff;--sb-border:#E5E7EB;--text:#1A1A2E;--text2:#374151;--text3:#6B7280;--text4:#94A3B8;--text5:#B0B7C3;--acc:#2196F3;--acc-dk:#1565C0;--acc-mid:#5C9CE6;--acc-teal:#26A69A;--acc-lt:#80CBC4;--acc-bg:rgba(33,150,243,.15);--border:#E5E7EB;--hover:#F0F4F8;--kp-hl-border:#EF4444;--kp-hl-bg:linear-gradient(90deg,#FFF5F5,#fff);--tb-stripe:#FAFBFD;--chart-label:#374151;--chart-grid:rgba(0,0,0,.06)}
body.dark{--bg:#0F1219;--card:#171B2D;--card-sh:0 1px 4px rgba(0,0,0,.4);--sb-bg:#121626;--sb-border:#232840;--text:#E4E5EA;--text2:#C0C2CC;--text3:#8A8D9E;--text4:#5C6070;--text5:#3E4252;--border:#232840;--hover:#1C2038;--kp-hl-border:#EF4444;--kp-hl-bg:linear-gradient(90deg,#2A1A1A,#171B2D);--tb-stripe:#1A1E32;--chart-label:#8A8D9E;--chart-grid:rgba(255,255,255,.06)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background .3s,color .3s;background-image:radial-gradient(circle,rgba(33,150,243,.10) 1px,transparent 1px);background-size:22px 22px;background-attachment:fixed;background-position:0 0}
body.dark{background-image:radial-gradient(circle,rgba(33,150,243,.12) 1px,transparent 1px);background-size:22px 22px}
body.compact .kr{gap:.4rem}.compact .kp{padding:.45rem .6rem}.compact .kp-v{font-size:1.05rem}.compact .kp-l{font-size:.52rem;margin-bottom:.15rem}.compact .cd{padding:.7rem}.compact .sec-h{margin:1.2rem 0 .5rem}.compact .ph-title{font-size:1.1rem}.compact .mn-inner{max-width:950px}
body.glass .kp,body.glass .cd,body.glass .tb,body.glass .fd-panel,body.glass .theme-panel,body.glass .theme-fab{backdrop-filter:blur(var(--glass-blur,12px));-webkit-backdrop-filter:blur(var(--glass-blur,12px))}
body.glass .kp{background:rgba(255,255,255,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.25);box-shadow:0 4px 16px rgba(0,0,0,.04)}
body.glass .cd{background:rgba(255,255,255,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.25);box-shadow:0 4px 16px rgba(0,0,0,.04)}
body.glass .theme-panel,body.glass .theme-fab{background:rgba(255,255,255,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.25)}
body.glass .fd-panel{background:rgba(255,255,255,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.25)}
body.glass.dark .kp,body.glass.dark .cd{background:rgba(23,27,45,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 16px rgba(0,0,0,.2)}
body.glass.dark .theme-panel,body.glass.dark .theme-fab,body.glass.dark .fd-panel{background:rgba(23,27,45,var(--glass-opacity,.7));border:1px solid rgba(255,255,255,.06)}
body.glass .kp-hl{border-left:3px solid var(--kp-hl-border)}
body.glass .kp-hl-up{border-left:3px solid #10B981}

/* ─── V2: Filter-driven single page ─── */
.sb-tagline{font-size:.6rem;color:var(--text5);padding:0 1.1rem;font-weight:500;letter-spacing:.3px;margin-top:-.5rem;margin-bottom:1rem}
body.dark .sb-tagline{color:var(--text5)}
.v2-header{margin-bottom:1.1rem}
.v2-title{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;color:var(--text);line-height:1.15;margin-bottom:.25rem}
.v2-sub{font-size:.72rem;color:var(--text4);font-weight:500}
.v2-bar{display:flex;align-items:center;gap:.85rem;padding:.7rem .9rem;background:var(--card);border-radius:11px;box-shadow:var(--card-sh);margin-bottom:.6rem;flex-wrap:wrap;border:1px solid var(--border)}
.v2-bar-section{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.v2-bar-spacer{flex:1;min-width:0}
.v2-bar-label{font-size:.55rem;font-weight:700;color:var(--text4);letter-spacing:.7px;text-transform:uppercase}
.v2-chips{display:flex;gap:.32rem;flex-wrap:wrap}
.v2-chip{font-size:.7rem;font-weight:600;color:var(--text3);background:transparent;border:1px solid var(--border);border-radius:7px;padding:.36rem .7rem;cursor:pointer;transition:all .18s ease;user-select:none;font-family:inherit}
.v2-chip:hover{border-color:var(--acc-mid);color:var(--text2)}
.v2-chip.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
body.dark .v2-chip.on{color:#fff}
.v2-btn{font-size:.7rem;font-weight:600;color:var(--text2);background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.4rem .75rem;cursor:pointer;transition:all .18s ease;display:inline-flex;align-items:center;gap:.4rem;font-family:inherit}
.v2-btn:hover{border-color:var(--acc-mid);color:var(--text)}
.v2-btn-primary{background:var(--acc);border-color:var(--acc);color:#fff}
.v2-btn-primary:hover{background:var(--acc-dk);border-color:var(--acc-dk);color:#fff}
.v2-fp-badge{background:#fff;color:var(--acc);font-size:.55rem;font-weight:800;padding:.05rem .35rem;border-radius:6px;margin-left:.2rem;min-width:14px;text-align:center}
.v2-fp-wrap{position:relative}
.v2-fp-panel{position:absolute;top:calc(100% + .5rem);right:0;width:340px;max-height:70vh;overflow-y:auto;background:var(--card);border-radius:11px;box-shadow:0 12px 38px rgba(0,0,0,.18);border:1px solid var(--border);display:none;z-index:50;padding:1rem 1.1rem}
.v2-fp-panel.open{display:block;animation:fi .2s ease}
.v2-fp-h{font-size:.55rem;font-weight:700;color:var(--text4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between}
.v2-fp-h .v2-fp-clear{font-size:.6rem;color:var(--acc);cursor:pointer;font-weight:600;text-transform:none;letter-spacing:0}
.v2-fp-h .v2-fp-clear:hover{text-decoration:underline}
.v2-fp-section{margin-bottom:1rem}
.v2-fp-section:last-child{margin-bottom:0}
.v2-fp-divider{height:1px;background:var(--border);margin:.75rem 0}
.v2-fp-team-h{font-size:.62rem;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin:.55rem 0 .35rem;display:flex;align-items:center;gap:.4rem}
.v2-fp-team-h::before{content:"";width:3px;height:11px;background:var(--acc);border-radius:2px}
.v2-fp-row{display:flex;align-items:center;gap:.55rem;padding:.32rem .35rem;border-radius:6px;cursor:pointer;font-size:.72rem;color:var(--text2);transition:background .15s ease,color .15s ease;user-select:none}
.v2-fp-row:hover{background:var(--hover)}
.v2-fp-row.team-row{font-weight:700;font-size:.74rem;color:var(--text)}
.v2-fp-row.section-row{padding-left:.95rem}
.v2-fp-row.indented-all{padding-left:.95rem;font-weight:700;color:var(--text)}
.v2-cb{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--text5);background:var(--card);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s ease;position:relative}
.v2-fp-row:hover .v2-cb{border-color:var(--acc-mid)}
.v2-cb.on{background:var(--acc);border-color:var(--acc)}
.v2-cb.on::after{content:"";position:absolute;top:1px;left:4px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.v2-cb.indeterminate{background:var(--acc);border-color:var(--acc)}
.v2-cb.indeterminate::after{content:"";position:absolute;top:5.5px;left:2px;width:8px;height:2px;background:#fff;border-radius:1px}
.v2-pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;min-height:0}
.v2-pills:empty{display:none}
.v2-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--acc-bg);color:var(--acc-dk);font-size:.65rem;font-weight:600;padding:.32rem .5rem .32rem .65rem;border-radius:6px;border:1px solid transparent;animation:fi .2s ease}
body.dark .v2-pill{color:var(--acc);background:rgba(33,150,243,.15);border-color:rgba(33,150,243,.25)}
.v2-pill .v2-pill-x{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:transparent;color:inherit;opacity:.55;transition:all .15s ease}
.v2-pill .v2-pill-x:hover{opacity:1;background:rgba(33,150,243,.18)}
.v2-pill .v2-pill-x svg{width:9px;height:9px}
.v2-pill-clear{display:inline-flex;align-items:center;gap:.3rem;background:transparent;color:var(--text5);font-size:.62rem;font-weight:600;padding:.32rem .55rem;border-radius:6px;border:1px dashed var(--border);cursor:pointer;transition:all .15s ease;font-family:inherit}
.v2-pill-clear:hover{color:var(--text3);border-color:var(--text5)}
.v2-section{margin-bottom:2.2rem;animation:fi .25s ease}
/* Section grid: pairs sections side-by-side when grouped */
.v2-section-row{display:grid;grid-template-columns:1fr;gap:1.5rem;margin-bottom:2.2rem}
.v2-section-row.cols-2{grid-template-columns:1fr 1fr}
.v2-section-row .v2-section{margin-bottom:0}
@media(max-width:1100px){.v2-section-row.cols-2{grid-template-columns:1fr}}
.v2-section-h{display:flex;align-items:center;gap:.65rem;margin-bottom:.75rem;padding-bottom:.4rem;padding-top:.2rem;border-bottom:1px solid var(--border)}
.v2-section-team{font-size:.55rem;font-weight:800;color:#fff;background:var(--acc);padding:.2rem .55rem;border-radius:5px;letter-spacing:.7px;text-transform:uppercase}
.v2-section-team.team-tms{background:#26A69A}
.v2-section-team.team-nontms{background:#90A4AE}
.v2-section-name{font-size:1.05rem;font-weight:800;color:var(--text);letter-spacing:-.3px}
.v2-empty{padding:4rem 2rem;text-align:center;color:var(--text4);font-size:.78rem;background:var(--card);border-radius:11px;box-shadow:var(--card-sh)}
.v2-empty .v2-empty-icon{margin:0 auto .8rem;width:48px;height:48px;color:var(--text5);opacity:.6}
.v2-empty .v2-empty-title{font-size:.92rem;font-weight:700;color:var(--text2);margin-bottom:.35rem}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}


/* ─── V3: Clean filter bar + popovers ─── */
.v3-header{margin-bottom:1.1rem}
.v3-title{font-size:1.6rem;font-weight:800;letter-spacing:-.6px;color:var(--text);line-height:1.15;margin:0;text-align:center}
.v3-title .v3-t-top{display:block;font-size:.78rem;font-weight:700;letter-spacing:7px;text-transform:uppercase;margin-bottom:.3rem;background:linear-gradient(90deg,#1565C0 0%,#2196F3 25%,#90CAF9 45%,#E3F2FD 50%,#90CAF9 55%,#2196F3 75%,#1565C0 100%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:v3dashGlide 3s linear infinite}
.v3-title .v3-t-line{display:block;width:50px;height:2.5px;background:linear-gradient(90deg,var(--acc),var(--acc-mid));margin:.3rem auto .4rem;border-radius:2px}
.v3-title .v3-t-bot{display:block;font-size:2.55rem;font-weight:800;letter-spacing:-1.4px;line-height:1;color:#1565C0;background:linear-gradient(90deg,#1565C0 0%,#1565C0 30%,#90CAF9 45%,#E3F2FD 50%,#90CAF9 55%,#1565C0 70%,#1565C0 100%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:v3dashGlide 2.5s linear infinite;cursor:default}
.v3-title .v3-t-bot:hover{animation-duration:1.2s}
@keyframes v3dashGlide{0%{background-position:100% 0}100%{background-position:-100% 0}}
@media(prefers-reduced-motion:reduce){
  .v3-title .v3-t-bot{animation:none}
}
body.pulse-still .v3-title .v3-t-bot{animation:none}
.v3-bar{display:flex;align-items:center;gap:.55rem;padding:.55rem .65rem;background:var(--card);border-radius:11px;box-shadow:var(--card-sh);margin-bottom:.7rem;border:1px solid var(--border);flex-wrap:wrap}
.v3-bar-group{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.v3-bar-spacer{flex:1;min-width:0}

/* Popover triggers */
.v3-pop-wrap{position:relative}
.v3-pop-trigger{display:inline-flex;align-items:center;gap:.55rem;padding:.5rem .75rem;background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;color:var(--text2);transition:background .15s ease,border-color .15s ease,color .15s ease;font-size:.7rem}
.v3-pop-trigger:hover{background:var(--hover);border-color:var(--border)}
.v3-pop-trigger.active{background:var(--acc-bg);border-color:var(--acc);color:var(--acc-dk)}
body.dark .v3-pop-trigger.active{background:rgba(33,150,243,.15);color:var(--acc)}
.v3-pop-icon{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;color:var(--text4)}
.v3-pop-trigger:hover .v3-pop-icon{color:var(--text2)}
.v3-pop-trigger.active .v3-pop-icon{color:var(--acc-dk)}
body.dark .v3-pop-trigger.active .v3-pop-icon{color:var(--acc)}
.v3-pop-label{font-weight:600;color:var(--text4)}
.v3-pop-trigger:hover .v3-pop-label{color:var(--text3)}
.v3-pop-trigger.active .v3-pop-label{color:var(--acc-dk)}
body.dark .v3-pop-trigger.active .v3-pop-label{color:var(--acc)}
.v3-pop-value{font-weight:700;color:var(--text);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v3-pop-trigger.active .v3-pop-value{color:var(--acc-dk)}
body.dark .v3-pop-trigger.active .v3-pop-value{color:var(--acc)}
.v3-pop-caret{width:11px;height:11px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;color:var(--text5);transition:transform .2s ease}
.v3-pop-trigger.active .v3-pop-caret{transform:rotate(180deg);color:var(--acc-dk)}
body.dark .v3-pop-trigger.active .v3-pop-caret{color:var(--acc)}

/* Popover panels */
.v3-pop{position:absolute;top:calc(100% + .4rem);left:0;width:280px;max-height:62vh;overflow-y:auto;background:var(--card);border-radius:10px;box-shadow:0 14px 42px rgba(0,0,0,.16),0 2px 6px rgba(0,0,0,.04);border:1px solid var(--border);display:none;z-index:60;padding:.65rem .55rem;opacity:0;transform:translateY(-6px);transition:opacity .18s ease,transform .18s ease}
body.dark .v3-pop{box-shadow:0 14px 42px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.2)}
.v3-pop.open{display:block}
.v3-pop.shown{opacity:1;transform:translateY(0)}
.v3-pop-wide{width:340px}
.v3-pop-h{font-size:.55rem;font-weight:700;color:var(--text4);letter-spacing:.7px;text-transform:uppercase;padding:.3rem .55rem .35rem;display:flex;align-items:center;justify-content:space-between}
.v3-pop-h .v3-pop-clear{font-size:.6rem;color:var(--acc);cursor:pointer;font-weight:600;text-transform:none;letter-spacing:0;padding:.15rem .35rem;border-radius:5px;transition:background .15s}
.v3-pop-h .v3-pop-clear:hover{background:var(--acc-bg)}
body.dark .v3-pop-h .v3-pop-clear:hover{background:rgba(33,150,243,.12)}
.v3-pop-divider{height:1px;background:var(--border);margin:.4rem .15rem}
.v3-team-h{font-size:.58rem;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;padding:.5rem .55rem .25rem;display:flex;align-items:center;gap:.4rem}
.v3-team-h::before{content:"";width:3px;height:10px;background:var(--acc);border-radius:2px}
.v3-team-h.team-tms::before{background:#26A69A}
.v3-team-h.team-nontms::before{background:#90A4AE}
.v3-row{display:flex;align-items:center;gap:.55rem;padding:.42rem .55rem;border-radius:6px;cursor:pointer;font-size:.72rem;color:var(--text2);transition:background .12s ease;user-select:none;line-height:1.25}
.v3-row:hover{background:var(--hover)}
.v3-row.is-all{font-weight:700;color:var(--text)}
.v3-row.section-row{padding-left:1.25rem}
.v3-row .v3-row-meta{font-size:.55rem;color:var(--text5);margin-left:auto;font-weight:500}
.v3-cb{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--text5);background:var(--card);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s ease;position:relative}
.v3-row:hover .v3-cb{border-color:var(--acc-mid)}
.v3-cb.on{background:var(--acc);border-color:var(--acc)}
.v3-cb.on::after{content:"";position:absolute;top:1px;left:4px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.v3-cb.indeterminate{background:var(--acc);border-color:var(--acc)}
.v3-cb.indeterminate::after{content:"";position:absolute;top:5.5px;left:2px;width:8px;height:2px;background:#fff;border-radius:1px}

/* Icon-only buttons (Values, Export) */
.v3-icon-btn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;color:var(--text3);transition:all .15s ease;font-family:inherit}
.v3-icon-btn:hover{background:var(--hover);border-color:var(--border);color:var(--text2)}
.v3-icon-btn:active{transform:scale(0.96)}
.v3-icon-btn.active{background:var(--acc-bg);border-color:var(--acc);color:var(--acc-dk)}
body.dark .v3-icon-btn.active{background:rgba(33,150,243,.15);color:var(--acc)}
.v3-icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block}

/* Empty state interactive */
.v3-empty{padding:3rem 2rem;text-align:center;background:var(--card);border-radius:11px;box-shadow:var(--card-sh);border:1px dashed var(--border);max-width:520px;margin:1rem auto}
.v3-empty-icon{width:42px;height:42px;color:var(--text5);opacity:.6;margin:0 auto .65rem;stroke:currentColor;fill:none;stroke-width:1.5}
.v3-empty-title{font-size:.95rem;font-weight:700;color:var(--text2);margin-bottom:.35rem}
.v3-empty-msg{font-size:.72rem;color:var(--text4);line-height:1.55;margin-bottom:.95rem}
.v3-empty-action{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;background:var(--acc);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.72rem;font-weight:600;font-family:inherit;transition:all .15s ease}
.v3-empty-action:hover{background:var(--acc-dk);transform:translateY(-1px)}
.v3-empty-action svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* Print: hide chrome, expand stack */
@media print{
  .theme-fab,.theme-panel,.v3-bar,.v2-pills{display:none !important}
  body{background:#fff !important;color:#000 !important}
  .mn{padding:.5cm !important}
  .mn-inner{max-width:100% !important}
  .cd,.kp{box-shadow:none !important;border:1px solid #ddd !important;page-break-inside:avoid !important}
  .v2-section{page-break-after:auto;page-break-inside:avoid}
  .v2-section-row.cols-2{grid-template-columns:1fr 1fr}
  .v3-header{margin-bottom:.4cm}
  .v3-title{font-size:18pt}
}


/* V3 popover search input */
.v3-pop-search{display:flex;align-items:center;gap:.4rem;padding:.38rem .55rem;margin:.35rem .15rem .3rem;border:1px solid var(--border);border-radius:7px;background:var(--bg);transition:border-color .15s}
.v3-pop-search:focus-within{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-bg)}
.v3-pop-search svg{width:13px;height:13px;stroke:var(--text5);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.v3-pop-search input{border:none;background:transparent;outline:none;font-size:.7rem;font-family:inherit;color:var(--text);width:100%;padding:0}
.v3-pop-search input::placeholder{color:var(--text5)}
.v3-row.hidden{display:none}
.v3-team-h.hidden{display:none}
.v3-pop-no-match{padding:.8rem .55rem;text-align:center;font-size:.7rem;color:var(--text5);display:none}
/* Checkbox animation */
.v3-cb{transition:all .12s cubic-bezier(.4,0,.2,1)}
.v3-cb.on{animation:v3check .2s ease}.v3-cb.indeterminate{animation:v3check .2s ease}
@keyframes v3check{0%{transform:scale(.85)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* Paired sections: internal layouts adapt to narrower width */
.v2-section-row.cols-2 .tms-grid{grid-template-columns:1fr}
.v2-section-row.cols-2 .tms-pillrow{grid-template-columns:1fr 1fr 1fr}
.v2-section-row.cols-2 .kr{grid-template-columns:repeat(2,1fr) !important}
.v2-section-row.cols-2 .cr.c2,.v2-section-row.cols-2 .cr.c2e{grid-template-columns:1fr}
.v2-section-row.cols-2 .tms-mc-row{grid-template-columns:repeat(2,1fr) !important}
@media(max-width:1300px){
  .v2-section-row.cols-2 .tms-pillrow{grid-template-columns:1fr}
  .v2-section-row.cols-2 .kr{grid-template-columns:1fr 1fr !important}
}

/* ═══ TWEAKS: Mood ═══ */
body.mood-boardroom{--acc:#1E3A5F;--acc-dk:#0F2744;--acc-mid:#3D6B99;--acc-teal:#4A6D82;--acc-lt:#7A9BB5;--acc-bg:rgba(30,58,95,.12);--kpi-size:1.15rem;--bar-radius:3px;--card-radius:6px;--bar-thick:.45;--font-w-title:800;--font-w-kpi:700;--line-stroke:2}
body.mood-boardroom .kp-v{font-size:var(--kpi-size);font-weight:var(--font-w-kpi);font-variant-numeric:tabular-nums}
body.mood-boardroom .cd,.mood-boardroom .kp{border-radius:var(--card-radius)}
body.mood-boardroom .v3-title{font-weight:var(--font-w-title);letter-spacing:-.01em}
body.mood-boardroom .v2-section-team{border-radius:3px}
body.mood-boardroom .kp-hl{border-left-color:var(--acc)}

body.mood-energetic{--acc:#2979FF;--acc-dk:#1565C0;--acc-mid:#69A5FF;--acc-teal:#00E5A0;--acc-lt:#A0FFD4;--acc-bg:rgba(41,121,255,.18);--kpi-size:1.55rem;--bar-radius:10px;--card-radius:14px;--bar-thick:.7;--font-w-title:800;--font-w-kpi:800;--line-stroke:3}
body.mood-energetic .kp-v{font-size:var(--kpi-size);font-weight:var(--font-w-kpi);font-variant-numeric:tabular-nums}
body.mood-energetic .cd,.mood-energetic .kp{border-radius:var(--card-radius)}
body.mood-energetic .v3-title{font-weight:var(--font-w-title)}
body.mood-energetic .kp{box-shadow:0 0 20px var(--acc-bg),var(--card-sh)}
body.mood-energetic .v2-section-team{border-radius:999px}

/* ═══ TWEAKS: Surface ═══ */
/* Paper: completely flat, no elevation, hairline borders, slightly warm bg tint */
body.surf-paper{--card-sh:none}
body.surf-paper .kp,body.surf-paper .cd,body.surf-paper .tb{background:var(--card);box-shadow:none !important;border:1px solid var(--border);border-radius:4px}
body.surf-paper .v3-bar{box-shadow:none !important;border:1px solid var(--border);border-radius:6px}
body.surf-paper .theme-panel{box-shadow:none !important;border:1px solid var(--border)}
body.surf-paper .v2-section-team{border-radius:3px}
body.surf-paper .kp-hl{border-left:2px solid var(--kp-hl-border)}
body.surf-paper .v3-pop{box-shadow:0 2px 8px rgba(0,0,0,.08) !important;border:1px solid var(--border)}

/* Matte: inset painted-panel feel, top-light gradient, heavier borders */
body.surf-matte .kp,body.surf-matte .cd,body.surf-matte .tb{background:linear-gradient(180deg,var(--card) 0%,var(--bg) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45),inset 0 -1px 0 rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04) !important;border:1.5px solid var(--border)}
body.surf-matte .v3-bar{background:linear-gradient(180deg,var(--card) 0%,var(--bg) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.45) !important;border:1.5px solid var(--border)}
body.surf-matte .kp-v{text-shadow:0 1px 0 rgba(255,255,255,.6)}

body.surf-matte.dark .kp-v{text-shadow:0 1px 2px rgba(0,0,0,.4)}

/* ═══ TWEAKS: Pulse ═══ */
/* Still: no transitions, no animations anywhere */
body.pulse-still *{transition-duration:0s !important;animation-duration:0s !important;animation:none !important}
body.pulse-still .v3-pop{transition:none !important}
body.pulse-still .kp,body.pulse-still .cd{transition:none !important}

/* Lively: spring hovers, card lifts, breathing glow, bouncy pills */
body.pulse-lively .kp,body.pulse-lively .cd{transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease}
body.pulse-lively .kp:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 28px rgba(0,0,0,.12),0 0 0 1px var(--acc-bg)}
body.pulse-lively .cd:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.1)}
body.pulse-lively .v2-section{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}

body.pulse-lively .v3-icon-btn:hover{transform:scale(1.15)}
body.pulse-lively .v2-section-h{transition:transform .2s ease}
body.pulse-lively .v2-section:hover .v2-section-h{transform:translateX(3px)}
body.pulse-lively .tb tbody tr{transition:transform .15s ease,background .15s}
body.pulse-lively .tb tbody tr:hover{transform:translateX(2px)}

/* Respect prefers-reduced-motion */
@media(prefers-reduced-motion:reduce){
  body.pulse-lively .kp,body.pulse-lively .cd{transition:none}
  body.pulse-lively .kp:hover,body.pulse-lively .cd:hover{transform:none}

Chart.register({id:'barPop',beforeDraw:function(chart){

},afterDatasetsDraw:function(chart){

    if(meta.type!=='bar')return;

      if(!el._popScale||el._popScale<=1)return;
      var s=el._popScale,x=el.x,y=el.y,base=el.base,w=el.width;

function switchTabById(id){
  // V2: navigation by tab is gone; the "View detail" links from the Sanction
  // Summary point at sections that, in v2, are filtered. Switch the filter to
  // show only that section so it acts like a "drill-down" intent.
  var sectionMap={'screening':'sc','remittance':'rem','newsletter':'news','dttot':'dttot','nontms':'nontms'};
  var sId=sectionMap[id]||id;
  var found=V2_SECTIONS.filter(function(s){return s.id===sId})[0];

}

  {id:'rem',team:'sanction',label:'Remittance',renderer:function(){renderRemittance()},mountId:'rem-content',group:'san-b'},
  {id:'news',team:'sanction',label:'Newsletter',renderer:function(){renderNewsletter()},mountId:'news-content',group:'san-b'},
  {id:'dttot',team:'sanction',label:'DTTOT',renderer:function(){renderDTTOT()},mountId:'dttot-content',group:null},
  {id:'nontms',team:'nontms',label:'NON TMS',renderer:function(){renderNonTms()},mountId:'ntms-content',group:null},
  {id:'tms-rekyc',team:'tms',label:'Re-KYC User',renderer:function(){renderTms('tms-rekyc')},mountId:'tms-rekyc-content',group:'tms-a'},
  {id:'tms-rfi-user',team:'tms',label:'RFI User',renderer:function(){renderTms('tms-rfi-user')},mountId:'tms-rfi-user-content',group:'tms-a'},
  {id:'tms-rfi-kyb',team:'tms',label:'RFI KYB',renderer:function(){renderTms('tms-rfi-kyb')},mountId:'tms-rfi-kyb-content',group:'tms-b'},
  {id:'tms-risknotes',team:'tms',label:'Risk Notes',renderer:function(){renderTms('tms-risknotes')},mountId:'tms-risknotes-content',group:'tms-b'},
  {id:'tms-p2p',team:'tms',label:'P2P Receiver',renderer:function(){renderTms('tms-p2p')},mountId:'tms-p2p-content',group:'tms-c'},
  {id:'tms-dormant',team:'tms',label:'Dormant',renderer:function(){renderTms('tms-dormant')},mountId:'tms-dormant-content',group:'tms-c'},
  {id:'tms-merchant',team:'tms',label:'Merchant Screening',renderer:function(){renderTms('tms-merchant')},mountId:'tms-merchant-content',group:'tms-d'},
  {id:'tms-tms',team:'tms',label:'Transaction Monitoring System',renderer:function(){renderTms('tms-tms')},mountId:'tms-tms-content',group:null},
  {id:'tms-unmask',team:'tms',label:'Unmasking Request',renderer:function(){renderTms('tms-unmask')},mountId:'tms-unmask-content',group:'tms-e'},
  {id:'tms-cs',team:'tms',label:'CS Escalation',renderer:function(){renderTms('tms-cs')},mountId:'tms-cs-content',group:'tms-e'}
];
var V2_TEAMS=[
  {id:'sanction',label:'Sanction'},
  {id:'nontms',label:'NON TMS'},
  {id:'tms',label:'TMS'}
];

// ── State (sets are sources of truth; empty = "all selected") ──
var v2State={
  activeSections:new Set(),
  activeMonths:new Set(),
  monthsExplicitEmpty:false,
  sectionsExplicitEmpty:false
};
// Track which popover is currently open (null | 'period' | 'sections')
var _openPop=null;
// Debounce render while user is rapidly clicking checkboxes
var _renderTimer=null;
function _debouncedRender(){
  if(_renderTimer)clearTimeout(_renderTimer);
  _renderTimer=setTimeout(function(){_renderTimer=null;v2RenderStack()},80);
}

// ── Helpers: which months/sections are currently "in" ──
function v3PickedMonths(){
  if(v2State.activeMonths.size===0)return STORE.months.slice();
  return STORE.months.filter(function(m){return v2State.activeMonths.has(m)});
}
function v3IsAllMonths(){return v2State.activeMonths.size===0||v2State.activeMonths.size===STORE.months.length}
function v2GetActiveSections(){
  if(v2State.sectionsExplicitEmpty)return [];
  if(v2State.activeSections.size===0)return V2_SECTIONS.slice();
  return V2_SECTIONS.filter(function(s){return v2State.activeSections.has(s.id)});
}
function v2TeamSections(teamId){return V2_SECTIONS.filter(function(s){return s.team===teamId})}
function v2TeamCheckState(teamId){
  var team=v2TeamSections(teamId);
  if(v2State.sectionsExplicitEmpty)return 'off';
  if(v2State.activeSections.size===0)return 'on';
  var active=team.filter(function(s){return v2State.activeSections.has(s.id)});
  if(active.length===0)return 'off';
  if(active.length===team.length)return 'on';
  return 'indeterminate';
}

// ── Override prevMonth + getMonths so renderers honor the picked months ──
prevMonth=function(){
  var picks=v3PickedMonths();
  var i=picks.indexOf(curMonth);
  if(i>0)return picks[i-1];
  if(picks.length<=1){
    var ms=STORE.months,j=ms.indexOf(curMonth);
    return j>0?ms[j-1]:null;
  }
  return null;
};
getMonths=function(){return v3PickedMonths()};

// ── Derived focus month ──
function v3SyncCurMonth(){
  var picks=v3PickedMonths();
  if(picks.length===0)return;
  if(picks.indexOf(curMonth)===-1)curMonth=picks[picks.length-1];
}

// ── Mutations: months (always live, popover stays open) ──
function v3ToggleMonth(m){
  var ref=v2State.activeMonths;
  var wasExplicitEmpty=v2State.monthsExplicitEmpty;
  var wasAllOn=ref.size===0&&!wasExplicitEmpty;
  v2State.monthsExplicitEmpty=false;
  if(wasExplicitEmpty){
    // Nothing was selected — user is picking from scratch, just add this one
    ref.add(m);
  } else if(wasAllOn){
    // All were on — user wants to deselect this one, so add all except it
    STORE.months.forEach(function(mm){if(mm!==m)ref.add(mm)});
  } else if(ref.has(m)){
    ref.delete(m);
    // If nothing left, go to explicit empty (not "all on")
    if(ref.size===0)v2State.monthsExplicitEmpty=true;
  } else {
    ref.add(m);
  }
  // If every month is now selected, normalize to "all on" (empty set)
  if(ref.size===STORE.months.length){ref.clear();v2State.monthsExplicitEmpty=false}
  v3UpdateTriggerLabels();
  v2BuildPills();
  v3RefreshPeriodCheckboxes();
  _debouncedRender();
}
function v3ToggleAllMonths(){
  var allOn=v2State.activeMonths.size===0&&!v2State.monthsExplicitEmpty;
  if(allOn){
    // All are on → turn all off (explicit empty)
    v2State.activeMonths.clear();
    v2State.monthsExplicitEmpty=true;
  } else {
    // Some or none selected → select all
    v2State.activeMonths.clear();
    v2State.monthsExplicitEmpty=false;
  }
  v3UpdateTriggerLabels();
  v2BuildPills();
  if(_openPop==='period')v3RefreshPeriodCheckboxes();
  _debouncedRender();
}
// Keep legacy name for the "All months" link in the popover header (always selects all)
function v3SelectAllMonths(){
  v2State.monthsExplicitEmpty=false;
  v2State.activeMonths.clear();
  v3UpdateTriggerLabels();
  v2BuildPills();
  if(_openPop==='period')v3RefreshPeriodCheckboxes();
  _debouncedRender();
}

// ── Mutations: sections (always live, popover stays open) ──
function v2ToggleSection(sectionId){
  var ref=v2State.activeSections;
  var wasExplicitEmpty=v2State.sectionsExplicitEmpty;
  var wasAllOn=ref.size===0&&!wasExplicitEmpty;
  v2State.sectionsExplicitEmpty=false;
  if(wasExplicitEmpty){
    ref.add(sectionId);
  } else if(wasAllOn){
    V2_SECTIONS.forEach(function(s){if(s.id!==sectionId)ref.add(s.id)});
  } else if(ref.has(sectionId)){
    ref.delete(sectionId);
    if(ref.size===0)v2State.sectionsExplicitEmpty=true;
  } else {
    ref.add(sectionId);
  }
  if(ref.size===V2_SECTIONS.length){ref.clear();v2State.sectionsExplicitEmpty=false}
  v3UpdateTriggerLabels();
  v2BuildPills();
  v3RefreshSectionCheckboxes();
  _debouncedRender();
}
function v2ToggleTeam(teamId){
  var ref=v2State.activeSections;
  var wasExplicitEmpty=v2State.sectionsExplicitEmpty;
  var wasAllOn=ref.size===0&&!wasExplicitEmpty;
  var team=v2TeamSections(teamId);
  v2State.sectionsExplicitEmpty=false;
  if(wasExplicitEmpty){
    // Nothing selected — add this team
    team.forEach(function(s){ref.add(s.id)});
  } else if(wasAllOn){
    // All on — remove this team
    V2_SECTIONS.forEach(function(s){if(s.team!==teamId)ref.add(s.id)});
    // Edge case: if only this team existed, now empty
    if(ref.size===0)v2State.sectionsExplicitEmpty=true;
  } else {
    var st=v2TeamCheckState(teamId);
    if(st==='on'){
      team.forEach(function(s){ref.delete(s.id)});
      if(ref.size===0)v2State.sectionsExplicitEmpty=true;
    } else {
      team.forEach(function(s){ref.add(s.id)});
    }
  }
  if(ref.size===V2_SECTIONS.length){ref.clear();v2State.sectionsExplicitEmpty=false}
  v3UpdateTriggerLabels();
  v2BuildPills();
  v3RefreshSectionCheckboxes();
  _debouncedRender();
}
function v2ClearFilters(){
  v2State.activeSections.clear();
  v2State.sectionsExplicitEmpty=false;
  v3UpdateTriggerLabels();
  v2BuildPills();
  if(_openPop==='sections')v3RefreshSectionCheckboxes();
  _debouncedRender();
}
function v2ToggleAllSections(){
  var allOn=v2State.activeSections.size===0&&!v2State.sectionsExplicitEmpty;
  if(allOn){
    v2State.activeSections.clear();
    v2State.sectionsExplicitEmpty=true;
  } else {
    v2State.activeSections.clear();
    v2State.sectionsExplicitEmpty=false;
  }
  v3UpdateTriggerLabels();
  v2BuildPills();
  if(_openPop==='sections')v3RefreshSectionCheckboxes();
  _debouncedRender();
}

// ── Popover open/close (simple toggle, no draft) ──
function _closePop(which){
  var el=document.getElementById('v3-pop-'+which);
  var trig=document.querySelector('[data-pop="'+which+'"] .v3-pop-trigger');
  if(!el)return;
  el.classList.remove('shown');
  setTimeout(function(){el.classList.remove('open')},160);
  if(trig)trig.classList.remove('active');
  if(_openPop===which)_openPop=null;
}
function _openPopover(which){
  var el=document.getElementById('v3-pop-'+which);
  var trig=document.querySelector('[data-pop="'+which+'"] .v3-pop-trigger');
  if(!el)return;
  if(which==='period')v3BuildPeriodPop();
  else v3BuildSectionsPop();
  el.classList.add('open');
  requestAnimationFrame(function(){el.classList.add('shown')});
  if(trig)trig.classList.add('active');
  _openPop=which;
  // Auto-focus search if sections
  if(which==='sections'){
    var inp=el.querySelector('.v3-pop-search input');
    if(inp)setTimeout(function(){inp.focus()},50);
  }
}
function v3TogglePop(which){
  // If a different popover is open, close it
  if(_openPop&&_openPop!==which)_closePop(_openPop);
  // Toggle current
  var el=document.getElementById('v3-pop-'+which);
  if(el&&el.classList.contains('open')){
    _closePop(which);
  } else {
    _openPopover(which);
  }
}

// Outside click → close any open popover
// Use mousedown instead of click — fires before innerHTML rebuild can orphan the target
var _popCloseBlocked=false;
document.addEventListener('mousedown',function(e){
  if(!_openPop||_popCloseBlocked)return;
  var wrap=document.querySelector('[data-pop="'+_openPop+'"]');
  if(wrap&&!wrap.contains(e.target)){
    _closePop(_openPop);
  }
});

// ── Build popover contents (full rebuild — only on first open) ──
function v3BuildPeriodPop(){
  var el=document.getElementById('v3-pop-period');
  if(!el)return;
  var ref=v2State.activeMonths;
  var allOn=ref.size===0&&!v2State.monthsExplicitEmpty;
  var pickCount=ref.size===0?(v2State.monthsExplicitEmpty?0:STORE.months.length):ref.size;
  var h='';
  h+='<div class="v3-pop-h"><span>Period <span style="color:var(--text5);font-weight:500" id="v3-period-count">('+pickCount+'/'+STORE.months.length+')</span></span><span class="v3-pop-clear" onmousedown="event.stopPropagation()" onclick="v3SelectAllMonths()">All months</span></div>';
  h+='<div class="v3-row is-all" onmousedown="event.stopPropagation()" onclick="v3ToggleAllMonths()"><span class="v3-cb '+(allOn?'on':'')+'" data-m="__all"></span>All months</div>';
  h+='<div class="v3-pop-divider"></div>';
  STORE.months.forEach(function(m){
    var on=allOn||ref.has(m);
    h+='<div class="v3-row" onmousedown="event.stopPropagation()" onclick="v3ToggleMonth(\''+m+'\')"><span class="v3-cb '+(on?'on':'')+'" data-m="'+m+'"></span>'+m+'</div>';
  });
  el.innerHTML=h;
}
// In-place checkbox refresh (no innerHTML nuke)
function v3RefreshPeriodCheckboxes(){
  var el=document.getElementById('v3-pop-period');
  if(!el)return;
  var ref=v2State.activeMonths;
  var allOn=ref.size===0&&!v2State.monthsExplicitEmpty;
  var pickCount=ref.size===0?(v2State.monthsExplicitEmpty?0:STORE.months.length):ref.size;
  // Update counter
  var cnt=document.getElementById('v3-period-count');
  if(cnt)cnt.textContent='('+pickCount+'/'+STORE.months.length+')';
  // Update checkboxes
  el.querySelectorAll('.v3-cb[data-m]').forEach(function(cb){
    var m=cb.getAttribute('data-m');
    var on;
    if(m==='__all') on=allOn;
    else on=allOn||ref.has(m);
    cb.classList.toggle('on',on);
  });
}

var _secSearchTerm='';
function v3BuildSectionsPop(){
  var el=document.getElementById('v3-pop-sections');
  if(!el)return;
  var ref=v2State.activeSections;
  var allOn=ref.size===0&&!v2State.sectionsExplicitEmpty;
  var totalActive=v2State.sectionsExplicitEmpty?0:(ref.size===0?V2_SECTIONS.length:ref.size);
  var q=_secSearchTerm.toLowerCase();
  var h='';
  h+='<div class="v3-pop-h"><span>Filters <span style="color:var(--text5);font-weight:500" id="v3-sec-count">('+totalActive+'/'+V2_SECTIONS.length+')</span></span></div>';
  // Search input
  h+='<div class="v3-pop-search" onmousedown="event.stopPropagation()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search sections\u2026" value="'+_secSearchTerm.replace(/"/g,'&quot;')+'" oninput="_secSearchTerm=this.value;v3FilterSectionRows()"></div>';
  h+='<div class="v3-row is-all" onmousedown="event.stopPropagation()" onclick="v2ToggleAllSections()"><span class="v3-cb '+(allOn?'on':'')+'" data-s="__all"></span>All sections</div>';
  h+='<div class="v3-pop-divider"></div>';
  var anyVisible=false;
  V2_TEAMS.forEach(function(t){
    var team=v2TeamSections(t.id);
    var st=v2TeamCheckState(t.id);
    var teamCls=t.id==='tms'?'team-tms':(t.id==='nontms'?'team-nontms':'');
    var teamVisible=team.some(function(s){return !q||s.label.toLowerCase().indexOf(q)>=0||t.label.toLowerCase().indexOf(q)>=0});
    var hidCls=teamVisible?'':'hidden';
    if(teamVisible)anyVisible=true;
    h+='<div class="v3-team-h '+teamCls+' '+hidCls+'" data-team="'+t.id+'">'+t.label+'</div>';
    h+='<div class="v3-row is-all '+hidCls+'" data-team="'+t.id+'" onmousedown="event.stopPropagation()" onclick="v2ToggleTeam(\''+t.id+'\')"><span class="v3-cb '+(st==='on'?'on':(st==='indeterminate'?'indeterminate':''))+'" data-t="'+t.id+'"></span>All '+t.label+'</div>';
    team.forEach(function(s){
      var on=allOn||ref.has(s.id);
      var match=!q||s.label.toLowerCase().indexOf(q)>=0||t.label.toLowerCase().indexOf(q)>=0;
      h+='<div class="v3-row section-row'+(match?'':' hidden')+'" data-section="'+s.id+'" onmousedown="event.stopPropagation()" onclick="v2ToggleSection(\''+s.id+'\')"><span class="v3-cb '+(on?'on':'')+'" data-s="'+s.id+'"></span>'+s.label+'</div>';
    });
  });
  h+='<div class="v3-pop-no-match" style="'+(anyVisible?'display:none':'')+'">No sections match your search.</div>';
  el.innerHTML=h;
}
// In-place checkbox refresh for sections
function v3RefreshSectionCheckboxes(){
  var el=document.getElementById('v3-pop-sections');
  if(!el)return;
  var ref=v2State.activeSections;
  var allOn=ref.size===0&&!v2State.sectionsExplicitEmpty;
  var totalActive=v2State.sectionsExplicitEmpty?0:(ref.size===0?V2_SECTIONS.length:ref.size);
  var cnt=document.getElementById('v3-sec-count');
  if(cnt)cnt.textContent='('+totalActive+'/'+V2_SECTIONS.length+')';
  // Team "All" checkboxes
  el.querySelectorAll('.v3-cb[data-t]').forEach(function(cb){
    var tid=cb.getAttribute('data-t');
    var st=v2TeamCheckState(tid);
    cb.classList.remove('on','indeterminate');
    if(st==='on')cb.classList.add('on');
    else if(st==='indeterminate')cb.classList.add('indeterminate');
  });
  // Individual section checkboxes + the All sections master checkbox
  el.querySelectorAll('.v3-cb[data-s]').forEach(function(cb){
    var sid=cb.getAttribute('data-s');
    if(sid==='__all'){
      cb.classList.toggle('on',allOn);
    } else {
      var on=allOn||ref.has(sid);
      cb.classList.toggle('on',on);
    }
  });
}
function v3FilterSectionRows(){
  var el=document.getElementById('v3-pop-sections');
  if(!el)return;
  var q=_secSearchTerm.toLowerCase();
  var anyVisible=false;
  V2_TEAMS.forEach(function(t){
    var teamMatch=t.label.toLowerCase().indexOf(q)>=0;
    var teamHdr=el.querySelector('.v3-team-h[data-team="'+t.id+'"]');
    var teamAll=el.querySelector('.v3-row.is-all[data-team="'+t.id+'"]');
    var team=v2TeamSections(t.id);
    var hasVisibleChild=false;
    team.forEach(function(s){
      var row=el.querySelector('.v3-row[data-section="'+s.id+'"]');
      if(!row)return;
      var match=!q||s.label.toLowerCase().indexOf(q)>=0||teamMatch;
      row.classList.toggle('hidden',!match);
      if(match)hasVisibleChild=true;
    });
    var show=hasVisibleChild||teamMatch;
    if(show)anyVisible=true;
    if(teamHdr)teamHdr.classList.toggle('hidden',!show);
    if(teamAll)teamAll.classList.toggle('hidden',!show);
  });
  var noMatch=el.querySelector('.v3-pop-no-match');
  if(noMatch)noMatch.style.display=anyVisible?'none':'block';
}

// ── Trigger labels ──
function v3UpdateTriggerLabels(){
  var pLbl='';
  if(v2State.monthsExplicitEmpty){pLbl='None'}
  else {
    var picks=v3PickedMonths();
    if(v3IsAllMonths()){pLbl='All months'}
    else if(picks.length===1){pLbl=shortMonth(picks[0])}
    else if(picks.length===2){pLbl=shortMonth(picks[0])+' + '+shortMonth(picks[1])}
    else{pLbl=picks.length+' months'}
  }
  document.getElementById('v3-period-value').textContent=pLbl;
  var sects=v2GetActiveSections();
  var sLbl='';
  if(v2State.sectionsExplicitEmpty){sLbl='None'}
  else if(v2State.activeSections.size===0){sLbl='All sections'}
  else if(sects.length===1)sLbl=sects[0].label;
  else{
    var byTeam={};
    sects.forEach(function(s){byTeam[s.team]=(byTeam[s.team]||0)+1});
    var parts=[];
    V2_TEAMS.forEach(function(t){
      var n=byTeam[t.id]||0;
      if(n===0)return;
      var total=v2TeamSections(t.id).length;
      if(n===total)parts.push(t.label);
      else parts.push(t.label+' ('+n+')');
    });
    sLbl=parts.join(' · ');
    if(sLbl.length>32)sLbl=sects.length+' sections';
  }
  document.getElementById('v3-sections-value').textContent=sLbl;
}

// ── Active filter pills ──
function v2BuildPills(){
  var container=document.getElementById('v2-pills');
  var h='';
  if(!v3IsAllMonths()&&!v2State.monthsExplicitEmpty){
    var picks=v3PickedMonths();
    picks.forEach(function(m){
      h+='<span class="v2-pill"><b>Period</b> &middot; '+shortMonth(m)+' <span class="v2-pill-x" onclick="v3RemoveMonthFromActive(\''+m+'\')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></span></span>';
    });
  }
  if(v2State.activeSections.size>0&&v2State.activeSections.size<V2_SECTIONS.length){
    V2_TEAMS.forEach(function(t){
      var team=v2TeamSections(t.id);
      var active=team.filter(function(s){return v2State.activeSections.has(s.id)});
      if(active.length===0)return;
      if(active.length===team.length){
        h+='<span class="v2-pill"><b>'+t.label+'</b> &middot; All <span class="v2-pill-x" onclick="v3RemoveTeamFromActive(\''+t.id+'\')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></span></span>';
      } else {
        active.forEach(function(s){
          h+='<span class="v2-pill"><b>'+t.label+'</b> &middot; '+s.label+' <span class="v2-pill-x" onclick="v3RemoveSectionFromActive(\''+s.id+'\')" title="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></span></span>';
        });
      }
    });
  }
  var hasMonthFilter=!v3IsAllMonths()||v2State.monthsExplicitEmpty;
  var hasSectionFilter=v2State.sectionsExplicitEmpty||(v2State.activeSections.size>0&&v2State.activeSections.size<V2_SECTIONS.length);
  if(hasMonthFilter||hasSectionFilter){
    h+='<button class="v2-pill-clear" onclick="v3ClearAllFilters()">Clear all</button>';
  }
  container.innerHTML=h;
}
// Pill removal — direct on active state
function v3RemoveMonthFromActive(m){
  if(v2State.activeMonths.size===0&&!v2State.monthsExplicitEmpty){
    STORE.months.forEach(function(mm){if(mm!==m)v2State.activeMonths.add(mm)});
  } else if(v2State.activeMonths.has(m)){
    v2State.activeMonths.delete(m);
    if(v2State.activeMonths.size===0)v2State.monthsExplicitEmpty=true;
  }
  if(v2State.activeMonths.size===STORE.months.length){v2State.activeMonths.clear();v2State.monthsExplicitEmpty=false}
  v3RenderAll();
}
function v3RemoveSectionFromActive(sid){
  if(v2State.activeSections.size===0&&!v2State.sectionsExplicitEmpty){V2_SECTIONS.forEach(function(s){v2State.activeSections.add(s.id)})}
  if(v2State.activeSections.has(sid))v2State.activeSections.delete(sid);
  if(v2State.activeSections.size===0)v2State.sectionsExplicitEmpty=true;
  if(v2State.activeSections.size===V2_SECTIONS.length){v2State.activeSections.clear();v2State.sectionsExplicitEmpty=false}
  v3RenderAll();
}
function v3RemoveTeamFromActive(tid){

// ── Section renderer (single-page stack with grouped layout) ──
function v2RenderStack(){
  destroyCharts();
  v3SyncCurMonth();
  var stack=document.getElementById('v2-stack');
  // Stash all renderer target divs back to the hidden host before wiping innerHTML
  var hiddenHost=null;
  document.querySelectorAll('.mn-inner > div[style*="display:none"]').forEach(function(el){if(!hiddenHost)hiddenHost=el});
  if(!hiddenHost){
    hiddenHost=document.createElement('div');
    hiddenHost.style.display='none';
    document.querySelector('.mn-inner').appendChild(hiddenHost);
  }
  V2_SECTIONS.forEach(function(s){
    var t=document.getElementById(s.mountId);
    if(t&&t.parentNode!==hiddenHost){
      t.parentNode.removeChild(t);
      hiddenHost.appendChild(t);
    }
  });
  // Empty-state guards
  if(v2State.monthsExplicitEmpty||(v2State.activeMonths.size===0&&STORE.months.length===0)){
    v3RenderEmptyMonths(stack);
    return;
  }
  var sections=v2GetActiveSections();
  if(sections.length===0){v3RenderEmptySections(stack);return}
  // Group sections: consecutive sections with the same non-null group become a row
  var rows=[];  // each row = {group:string|null, items:[section,...]}
  sections.forEach(function(s){
    var g=s.group||null;
    if(g&&rows.length>0&&rows[rows.length-1].group===g){
      rows[rows.length-1].items.push(s);
    } else {
      rows.push({group:g,items:[s]});
    }
  });
  // Build HTML
  var html='';
  rows.forEach(function(row){
    var isCols2=row.group&&row.items.length>=2;
    if(isCols2){
      html+='<div class="v2-section-row cols-2">';
    }
    row.items.forEach(function(s){
      var teamLabel=V2_TEAMS.filter(function(t){return t.id===s.team})[0].label;
      var teamCls='team-'+s.team;
      html+='<div class="v2-section" id="v2-sec-'+s.id+'">';
      html+='<div class="v2-section-h"><span class="v2-section-team '+teamCls+'">'+teamLabel+'</span><span class="v2-section-name">'+s.label+'</span></div>';
      html+='<div id="v2-mount-'+s.id+'"></div>';
      html+='</div>';
    });
    if(isCols2){
      html+='</div>';
    }
  });
  stack.innerHTML=html;
  sections.forEach(function(s){
    var hostMount=document.getElementById('v2-mount-'+s.id);
    var rendererTarget=document.getElementById(s.mountId);
    if(!hostMount||!rendererTarget)return;
    rendererTarget.parentNode.removeChild(rendererTarget);
    hostMount.appendChild(rendererTarget);
    rendererTarget.style.display='';
    try{s.renderer()}catch(e){console.error('Renderer error for',s.id,e);rendererTarget.innerHTML='<div class="placeholder">Error rendering '+s.label+'</div>'}
  });
  setTimeout(animateCounters,50);
  setTimeout(drawSparklines,100);
  setTimeout(initNarrToggles,120);
}

// ── Animated counters ──
function animateCounters(){
  document.querySelectorAll('.kp-v[data-count]').forEach(function(el){
    var target=parseFloat(el.getAttribute('data-count'));
    if(isNaN(target))return;
    var isPct=el.textContent.indexOf('%')!==-1;
    var dur=600,start=0,startTime=null;
    function step(ts){
      if(!startTime)startTime=ts;
      var p=Math.min((ts-startTime)/dur,1);
      var eased=1-Math.pow(1-p,3);
      var cur=start+(target-start)*eased;
      if(isPct){el.textContent=cur.toFixed(1)+'%'}
      else{el.textContent=fmt(Math.round(cur))}
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

// ── Sparklines ──
function drawSparklines(){
  var months=getMonths();if(months.length<2)return;
  document.querySelectorAll('.kp-spark').forEach(function(cv){
    var kpEl=cv.closest('.kp');if(!kpEl)return;
    var label=kpEl.querySelector('.kp-l');if(!label)return;
    var lbl=label.textContent.trim().toLowerCase();
    var vals=getSparkData(lbl,months);
    if(!vals||vals.length<2||vals.every(function(v){return v===0}))return;
    cv.style.display='block';
    var ctx=cv.getContext('2d');
    var w=cv.width,h=cv.height;
    ctx.clearRect(0,0,w,h);
    var max=Math.max.apply(null,vals)||1;
    var min=Math.min.apply(null,vals);
    var range=max-min||1;
    var accColor=gcv('--acc')||'#2196F3';
    ctx.strokeStyle=accColor;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();
    vals.forEach(function(v,i){
      var x=i/(vals.length-1)*w;
      var y=h-((v-min)/range)*(h-4)-2;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Fill
    var lastX=(vals.length-1)/(vals.length-1)*w;
    var lastY=h-((vals[vals.length-1]-min)/range)*(h-4)-2;
    ctx.lineTo(lastX,h);ctx.lineTo(0,h);ctx.closePath();
    ctx.fillStyle=accColor.replace(')',',0.08)').replace('rgb','rgba');
    if(accColor.charAt(0)==='#'){ctx.fillStyle=accColor+'14'}
    ctx.fill();
  });
}

// Keeps original casing in matched substrings.
var TMS_KW=[
  // Outcome / status terms
  'Reported','Monitored','Issue','Success','Successful','Failed','Failure',
  'EDD Success','Uncontactable','Answer','On Process','No Update','Unchanged','Changed','Revoked',
  'Whitelisted','Whitelisted by',
  // Channels / sources
  'DIANA','Kapture','Push Notification','Push Notifications',
  'Densus 88','PPATK','Risk Case','Back Office',
  // Typology terms
  'Online Gambling','Structuring','Smurfing','Narcotics','Adverse News',
  'Abnormal Transactions','Out-of-Profile Transactions','Unsatisfactory KYC',
  'Transactions at Unusual Hours',
  // KYC / CS
  'Fake ID Card','Fake Id Card','KTP On Screen','Selfie Fraudster',
  'Different User Name','Different Username','Name Typo','Pelajar/Mahasiswa',
  // TMS scenarios
  'ETO-M','ETI-W','ETI-M','non-automation UTRs','UTR','UTRs','UID','UIDs','RFI','RFIs','KYB','RFI KYB'
];
// Sort longer first so "Different User Name" wins over "Different"
TMS_KW.sort(function(a,b){return b.length-a.length});
var TMS_KW_RE=new RegExp('('+TMS_KW.map(function(k){return k.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&')}).join('|')+')','g');
// Match standalone numbers (incl. 1.2k-style with thousand separators), not inside words
var TMS_NUM_RE=/(?:^|[^\w])(\d{1,3}(?:[.,]\d{3})+|\d+(?:\.\d+)?%?)(?=$|[^\w])/g;

function tmsEscape(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tmsHL(text){
  if(!text)return '';
  var s=tmsEscape(text);
  // Highlight keywords first
  s=s.replace(TMS_KW_RE,'<span class="hl">$1</span>');
  // Then numbers (use replace with leading char preserved)
  s=s.replace(TMS_NUM_RE,function(m,num,offset,full){
    var prefix=m.length>num.length?m.charAt(0):'';
    return prefix+'<span class="hl-num">'+num+'</span>';
  });
  return s;
}
// Split notes into bullet items: split on newlines and on inline ' a. ' / ' b. '
// markers if any, then strip leading 'a. ' / 'A. ' / '1. '.
function tmsBullets(notes){
  if(!notes||!notes.trim()){return '<div class="narr-empty">No additional notes.</div>'}
  var lines=notes.split(/\n/).map(function(l){return l.trim()}).filter(Boolean);
  // Strip leading bullet markers like "a. ", "A. ", "1. ", "•"
  lines=lines.map(function(l){return l.replace(/^([a-zA-Z]\.\s+|\d+\.\s+|[•·]\s*)/,'').trim()}).filter(Boolean);
  if(lines.length===0)return '<div class="narr-empty">No additional notes.</div>';
  return '<ul>'+lines.map(function(l){return '<li>'+tmsHL(l)+'</li>'}).join('')+'</ul>';
}

// Sorted list of months that have data in a sub-page dict
function tmsMonthsOf(obj){
  if(!obj)return [];
  var all=Object.keys(obj).sort(function(a,b){return month_sort_key(a)-month_sort_key(b)});
  // Filter by period selection
  var picked=v3PickedMonths();
  if(picked.length<STORE.months.length){
    all=all.filter(function(m){return picked.indexOf(m)>=0});
  }
  return all;
}

// Build a delta between two month rows on a list of fields
function tmsDeltas(curRow,prevRow,prevLbl,fields){
  return fields.map(function(f){
    if(!prevRow)return null;
    return delta(N(curRow[f]),N(prevRow[f]),prevLbl);
  });
}


// Build a small at-a-glance grid for the Highlights panel
var _glanceColors=['#2196F3','#1565C0','#00ACC1','#0277BD','#283593'];
function tmsGlance(items,cols){
  if(!items||!items.length)return '';
  var c=cols===3?'cols-3':'';
  var h='<div class="tms-glance '+c+'">';
  items.forEach(function(it,idx){
    var sub='';
    if(it.sub){var cls=it.subCls?(' '+it.subCls):'';sub='<div class="s'+cls+'">'+it.sub+'</div>'}
    var vCls=(typeof it.v==='string'&&isNaN(parseFloat(it.v.replace(/[\.,%]/g,''))))?' txt':'';
    var gClr=_glanceColors[idx%_glanceColors.length];
    h+='<div class="tms-glance-i" style="--glance-accent:'+gClr+'"><div class="l">'+it.l+'</div><div class="v'+vCls+'">'+it.v+'</div>'+sub+'</div>';
  });
  h+='</div>';
  return h;
}
// Compute trend label vs prev row on a single field
function tmsTrend(cur,prev,fieldOrFn){
  var c=typeof fieldOrFn==='function'?fieldOrFn(cur):N(cur[fieldOrFn]);
  var p=prev?(typeof fieldOrFn==='function'?fieldOrFn(prev):N(prev[fieldOrFn])):null;
  if(p==null)return null;
  if(p===0)return c>0?{txt:'↑ New',cls:'up'}:{txt:'—',cls:''};
  var d=(c-p)/Math.abs(p)*100;
  if(d>0)return{txt:'↑ '+Math.abs(d).toFixed(1)+'%',cls:'up'};
  if(d<0)return{txt:'↓ '+Math.abs(d).toFixed(1)+'%',cls:'dn'};
  return{txt:'— flat',cls:''};
}
// Find the dominant key by value among labeled items: [{l:'Changed',v:1},...]
function tmsDominant(items){
  if(!items||!items.length)return null;
  var sorted=items.slice().sort(function(a,b){return b.v-a.v});
  return sorted[0];
}


// Build the context strip that replaces the redundant section header.
// month = 'March 2026', monthsArr = ['Jan 2026','Feb 2026','Mar 2026'], stat = {l:'13',sub:'total cases'}
function tmsCtx(month,monthsArr,stat){
  var h='<div class="tms-ctx">';
  h+='<span class="tms-ctx-pill">'+month.toUpperCase()+'</span>';

    h+='<span class="tms-ctx-meta">'+n+'-month view <b>'+first+' → '+last+'</b></span>';
  }
  h+='<span class="tms-ctx-spacer"></span>';

}


// Render a month-comparison strip. Each month gets a card with the listed fields.
// data = the per-sub-page month-keyed dict, months = sorted month labels, cm = current month label
// fields = [{l:'Changed',k:'changed'}, ...] or [{l:'X',fn:function(row){...}}]
function tmsMonthStrip(months,data,cm,fields,opts){
  if(!months||months.length<2)return '';
  opts=opts||{};
  var title=opts.title||'Month Comparison';
  var cols=Math.min(months.length,4);
  var h='<div class="tms-mc">';
  h+='<div class="tms-mc-h"><span class="lbl">'+title+'</span><span class="ln"></span></div>';
  h+='<div class="tms-mc-row" style="grid-template-columns:repeat('+cols+',1fr)">';
  months.slice(-4).forEach(function(m){
    var r=data[m]||{};
    var isCur=(m===cm);
    h+='<div class="tms-mc-card'+(isCur?' cur':'')+'">';
    h+='<div class="tms-mc-mlabel"><span>'+shortMonth(m)+'</span>'+(isCur?'<span class="badge">CURRENT</span>':'')+'</div>';
    var gridCls=fields.length<=2?'':(fields.length===3?'c3':'c4');
    h+='<div class="tms-mc-grid '+gridCls+'">';
    fields.forEach(function(f){
      var v=f.fn?f.fn(r):N(r[f.k]);
      var disp=f.fmt?f.fmt(v):fmt(v);
      h+='<div class="tms-mc-i"><span class="l">'+f.l+'</span><span class="v">'+disp+'</span></div>';
    });
    h+='</div></div>';
  });
  h+='</div></div>';
  return h;
}

// Render a collapsible notes archive showing previous months' Highlights bullets.
// notesByMonth = [{month:'February 2026', notes:'a. ...\nb. ...'}, ...] in chronological order
function tmsNotesArchive(notesByMonth,cm){
  // Filter to past months only (chronologically before cm)
  var past=notesByMonth.filter(function(it){return month_sort_key(it.month)<month_sort_key(cm)&&it.notes&&it.notes.trim()});
  if(past.length===0)return '';
  // Most-recent first
  past.reverse();
  var h='<div class="tms-archive">';
  h+='<div class="tms-archive-h" onclick="toggleTmsArchive(this)">';
  h+='<svg class="tms-archive-chev" viewBox="0 0 24 24" width="11" height="11"><polyline points="9 18 15 12 9 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  h+='<span>Past Highlights</span>';
  h+='<span class="tms-archive-count">'+past.length+' '+(past.length===1?'month':'months')+'</span>';
  h+='</div>';
  h+='<div class="tms-archive-body">';
  past.forEach(function(it){
    h+='<div class="tms-archive-mo"><div class="tms-archive-mo-h">'+shortMonth(it.month)+'</div><div class="tms-archive-mo-b">'+tmsBullets(it.notes)+'</div></div>';
  });
  h+='</div>';
  h+='</div>';
  return h;
}
function toggleTmsArchive(el){var w=el.parentElement;w.classList.toggle('open')}

// Master dispatch
function renderTms(tabId){
  var contentId=tabId+'-content';
  var el=document.getElementById(contentId);
  if(!el)return;
  window._tmsSubPage=tabId;

  if(!hasAny){
    el.innerHTML='<div class="placeholder">TMS data not loaded. Re-run the generator with TMS_Dashboard_Data_2026.xlsx in place.</div>';

// ── Sub-page: TMS (the actual TMS row) ──
function renderTmsTms(el,data){
  var months=tmsMonthsOf(data);

  var cm=curMonth;if(months.indexOf(cm)===-1)cm=months[months.length-1];

  } else {

    allCharts.push(new Chart(document.getElementById('tms-tms-c'),{type:'bar',data:{labels:lb,datasets:[
      Object.assign(bds('Total Alerts',months.map(function(m){return N((data[m]||{}).alerts)}),'#1565C0','#64B5F6'),{yAxisID:'y',datalabels:mkBDL()}),
      Object.assign(bds('Closed as Monitored',months.map(function(m){return N((data[m]||{}).monitored)}),'#2196F3','#90CAF9'),{yAxisID:'y',datalabels:{anchor:'end',align:'end',clamp:true,clip:false,color:function(){return _lblClr},font:{size:8,weight:'700'},display:function(c){return window.showLabels},formatter:function(v){return fmt(v)},offset:2}}),
      Object.assign(bds('Closed as Issue',months.map(function(m){return N((data[m]||{}).issue)}),'#1A237E','#5C6BC0'),{yAxisID:'y1',datalabels:mkBDL()})
    ]},options:{maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:14,font:{size:10}}},tooltip:tt,datalabels:{display:false}},scales:{y:Object.assign(axOpts(),{position:'left',title:{display:true,text:'Alerts / Monitored',font:{size:9},color:gcv('--text4')||'#B0B7C3'}}),y1:Object.assign(axOpts(),{position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'Issue',font:{size:9},color:gcv('--text4')||'#B0B7C3'}}),x:xO()},layout:{padding:{top:28}}}}));

// ── Sub-page: CS Escalation ──
function renderTmsCs(el,data){
  var months=tmsMonthsOf(data);
  if(!months.length){el.innerHTML='<div class="placeholder">No CS Escalation data.</div>';return}
  var cm=curMonth;if(months.indexOf(cm)===-1)cm=months[months.length-1];
  var d=data[cm]||{rows:[],by_category:{},total:0};
  var prevLbl=months.indexOf(cm)>0?months[months.indexOf(cm)-1]:null;
  var prev=prevLbl?data[prevLbl]:null;
  // KPIs by category for current month
  var bc=d.by_category||{};
  var dataIssue=N(bc['Data Issue']),fakeId=N(bc['Fake ID Card'])||N(bc['Fake Id Card']),photoIssue=N(bc['Photo Issue']),other=N(d.total)-(dataIssue+fakeId+photoIssue);
  if(other<0)other=0;
  var prevBc=prev?prev.by_category||{}:null;
  function dlt(k){if(!prevBc)return null;return delta(N(bc[k]),N(prevBc[k]),prevLbl)}
  var deltas=[dlt('Data Issue'),(prev?delta(fakeId,N((prev.by_category||{})['Fake ID Card'])||N((prev.by_category||{})['Fake Id Card']),prevLbl):null),dlt('Photo Issue'),(prev?delta(N(d.total),N(prev.total),prevLbl):null)];
  var O=outliers(deltas);
  // Build narrative summary from rows
  var topCat='';var topNum=0;Object.keys(bc).forEach(function(k){if(bc[k]>topNum){topNum=bc[k];topCat=k}});
  var summary=fmt(N(d.total))+' cases were submitted to the CS team for KYC verification due to discrepancies.\n';
  if(topCat)summary+=topCat+' was the most frequent issue, affecting '+fmt(topNum)+' UIDs.\n';
  summary+='UTRs were filed and revoke actions were applied to those UIDs.';

  var h='';
  // tmsCtx removed
  h+='<div class="kr" style="grid-template-columns:repeat(4,1fr)">';
  h+=kp('Data Issue',fmt(dataIssue),deltas[0],{hl:O[0]});
  h+=kp('Fake ID Card',fmt(fakeId),deltas[1],{hl:O[1]});
  h+=kp('Photo Issue',fmt(photoIssue),deltas[2],{hl:O[2]});
  h+=kp('Total Cases',fmt(N(d.total)),deltas[3],{hl:O[3]});
  h+='</div>';
  // Monthly trend across all months (so April shows alongside Jan/Feb/Mar)
  h+='<div class="cd" style="margin-bottom:.65rem"><div class="cd-t">CS Cases by Month</div><div style="height:200px"><canvas id="tms-cs-trend"></canvas></div></div>';
  h+='<div class="tms-grid">';
  // Left: doughnut + per-category table
  h+='<div class="tms-stack">';
  h+='<div class="cd"><div class="cd-t">Category Distribution \u2014 '+shortMonth(cm)+'</div><div style="display:flex;align-items:center;justify-content:center;gap:1.5rem"><div style="width:180px;height:180px;flex-shrink:0"><canvas id="tms-cs-d"></canvas></div><div style="font-size:.7rem;color:var(--text3);line-height:1.85" id="tms-cs-legend"></div></div></div>';
  // Detail table for current month
  h+='<div class="cd"><div class="cd-t">Case Detail \u2014 '+shortMonth(cm)+'</div><table class="tms-mini-tb"><thead><tr><th>Category</th><th>Remarks</th><th class="num">Number</th><th>Action</th></tr></thead><tbody>';
  (d.rows||[]).forEach(function(r){h+='<tr><td>'+r.category+'</td><td style="white-space:normal;font-size:.66rem;color:var(--text3)">'+(r.remarks||'').replace(/\n/g,'<br>')+'</td><td class="num">'+fmt(r.number)+'</td><td style="font-size:.66rem;color:var(--text3)">'+(r.action||'').replace(/\n/g,'<br>')+'</td></tr>'});
  h+='</tbody></table></div>';
  h+='</div>';
  // Right: narrative
  var csCats=Object.keys(bc);
  var csSorted=csCats.map(function(k){return{l:k,v:bc[k]}}).sort(function(a,b){return b.v-a.v});
  var csTop=csSorted[0]||{l:'\u2014',v:0};
  var csTopShare=N(d.total)>0?Math.round(csTop.v/N(d.total)*100):0;

  var csTrend=tmsTrend(d,prev,'total');
  var csGl=[{l:'Top Category',v:csTop.l,sub:csTopShare+'% \u2022 '+fmt(csTop.v)+' UIDs'},{l:'Revoked',v:fmt(csRevoked),sub:N(d.total)>0?Math.round(csRevoked/N(d.total)*100)+'% action rate':''},{l:'Total Trend',v:fmt(N(d.total)),sub:csTrend?csTrend.txt+(prevLbl?' vs '+shortMonth(prevLbl):''):'',subCls:csTrend?csTrend.cls:''}];
  h+='<div class="tms-narr"><div class="cd-t" style="margin-bottom:.55rem">At a Glance</div>'+tmsGlance(csGl,3)+'<div class="cd-t" style="margin-top:.7rem;margin-bottom:.45rem">Highlights</div>'+tmsBullets(summary)+'</div>';
  h+='</div>';

  var total=counts.reduce(function(a,b){return a+b},0);

  var pieCanvas=document.getElementById('tms-cs-d');

  // Build legend HTML

  // Monthly trend - shows total cases per month across all months (incl. April)
  var trendCanvas=document.getElementById('tms-cs-trend');
  if(trendCanvas){
    var trMonths=months;
    var trLb=trMonths.map(shortMonth);
    var trTotals=trMonths.map(function(m){return N((data[m]||{}).total)});
    var trDataIssue=trMonths.map(function(m){var b=(data[m]||{}).by_category||{};return N(b['Data Issue'])});
    var trFake=trMonths.map(function(m){var b=(data[m]||{}).by_category||{};return N(b['Fake ID Card'])||N(b['Fake Id Card'])});
    var trPhoto=trMonths.map(function(m){var b=(data[m]||{}).by_category||{};return N(b['Photo Issue'])});
    allCharts.push(new Chart(trendCanvas,{type:'bar',data:{labels:trLb,datasets:[
      bds('Data Issue',trDataIssue,'#2196F3','#90CAF9'),
      bds('Fake ID Card',trFake,'#1565C0','#5C9CE6'),
      bds('Photo Issue',trPhoto,'#00ACC1','#4DD0E1')
    ]},options:{maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:12,font:{size:10}}},tooltip:tt,datalabels:mkBDL()},scales:{y:axOpts(),x:xO()},layout:{padding:{top:18}}}}));
  }
}

// ── month_sort_key JS version ──
function month_sort_key(label){var mo=['January','February','March','April','May','June','July','August','September','October','November','December'];var parts=label.trim().split(' ');if(parts.length===2){var mi=mo.indexOf(parts[0]);if(mi>=0)return parseInt(parts[1])*100+mi}return 0}

function toggleThemePanel(){document.getElementById('theme-panel').classList.toggle('open')}

function applyChartColors(){
  var s=getComputedStyle(document.body);
  var tickClr=s.getPropertyValue('--text4').trim()||'#94A3B8';
  var gridClr=s.getPropertyValue('--chart-grid').trim()||'rgba(0,0,0,.06)';
  var legendClr=s.getPropertyValue('--text3').trim()||'#6B7280';
  allCharts.forEach(function(c){
    try{
      if(c.options.scales){['x','y','y1'].forEach(function(ax){if(c.options.scales[ax]){if(c.options.scales[ax].ticks)c.options.scales[ax].ticks.color=tickClr;if(c.options.scales[ax].grid)c.options.scales[ax].grid.color=gridClr}});}
      if(c.options.plugins&&c.options.plugins.legend&&c.options.plugins.legend.labels)c.options.plugins.legend.labels.color=legendClr;
      c.update('none');
    }catch(e){}
  });
}

function setMode(el){
  document.querySelectorAll('#tp-mode .tp-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  var m=el.getAttribute('data-m');
  document.body.classList.remove('dark');
  if(m)document.body.classList.add(m);
  localStorage.setItem('aml_mode',m);
  updLblClr();
  render();
}

function setDensity(el){
  document.querySelectorAll('#tp-density .tp-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  var d=el.getAttribute('data-d');
  document.body.classList.remove('compact');
  if(d)document.body.classList.add(d);
  localStorage.setItem('aml_density',d);
}

function toggleLabelsSwitch(){
  var sw=document.getElementById('tp-labels');
  sw.classList.toggle('on');
  var isOn=sw.classList.contains('on');
  document.getElementById('tp-labels-txt').textContent=isOn?'On':'Off';
  window.showLabels=isOn;
  allCharts.forEach(function(c){try{c.update()}catch(e){}});
  localStorage.setItem('aml_labels',isOn?'1':'0');
  var hdr=document.getElementById('lbl-toggle');if(hdr){hdr.classList.toggle('on',isOn);hdr.textContent=isOn?'Values: On':'Values: Off'}
}

// ── Tweaks: Mood / Surface / Pulse ──
var _tweakClasses={mood:['mood-boardroom','mood-energetic'],surface:['surf-paper','surf-matte'],pulse:['pulse-still','pulse-lively']};
var _tweakDefaults={mood:'calm',surface:'card',pulse:'subtle'};
function setTweak(kind,el){
  // Update button state
  document.querySelectorAll('#tp-'+kind+' .tp-seg-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  var v=el.getAttribute('data-v');
  // Remove old classes for this kind
  _tweakClasses[kind].forEach(function(c){document.body.classList.remove(c)});
  // Add new class if not the default (default = no class needed)
  var def=_tweakDefaults[kind];
  if(v!==def)document.body.classList.add(kind+'-'+v);
  localStorage.setItem('aml_'+kind,v);
  // Re-render charts to pick up new colors/sizes
  if(kind==='mood')render();
}

// Restore saved settings
(function(){
  var m=localStorage.getItem('aml_mode')||'';
  if(m){document.body.classList.add(m);var btn=document.querySelector('#tp-mode .tp-btn[data-m="'+m+'"]');if(btn){document.querySelectorAll('#tp-mode .tp-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')};updLblClr()}
  var d=localStorage.getItem('aml_density')||'';
  if(d){document.body.classList.add(d);var btn2=document.querySelector('#tp-density .tp-btn[data-d="'+d+'"]');if(btn2){document.querySelectorAll('#tp-density .tp-btn').forEach(function(b){b.classList.remove('active')});btn2.classList.add('active')}}
  var l=localStorage.getItem('aml_labels');
  if(l==='0'){window.showLabels=false;var sw=document.getElementById('tp-labels');if(sw){sw.classList.remove('on');document.getElementById('tp-labels-txt').textContent='Off'}}
  // Restore tweaks
  ['mood','surface','pulse'].forEach(function(kind){
    var v=localStorage.getItem('aml_'+kind)||_tweakDefaults[kind];
    if(v!==_tweakDefaults[kind])document.body.classList.add(kind+'-'+v);
    var btn=document.querySelector('#tp-'+kind+' .tp-seg-btn[data-v="'+v+'"]');
    if(btn){document.querySelectorAll('#tp-'+kind+' .tp-seg-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')}
  });
})();
// Close theme panel on outside click
document.addEventListener('click',function(e){var p=document.getElementById('theme-panel'),f=document.getElementById('theme-fab');if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!f.contains(e.target))p.classList.remove('open')});
</script>

<script>
async function hashPw(pw){var enc=new TextEncoder().encode(pw);var buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
var AUTH_HASH='fa979ebb9b5326b969d9503273dbf0311a25ac892c463533d7d6f0764600370c';
async function authCheck(){
  var pw=document.getElementById('auth-pw').value;
  var h=await hashPw(pw);
  if(h===AUTH_HASH){
    sessionStorage.setItem('aml_auth','1');
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('app-root').style.display='contents';
  } else {
    document.getElementById('auth-err').textContent='Incorrect password';
    document.getElementById('auth-pw').style.borderColor='#f87171';
    setTimeout(function(){document.getElementById('auth-err').textContent='';document.getElementById('auth-pw').style.borderColor='rgba(255,255,255,.15)'},2000);
  }
}
if(sessionStorage.getItem('aml_auth')==='1'){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('app-root').style.display='contents';
}
document.getElementById('auth-pw').focus();
</script>
